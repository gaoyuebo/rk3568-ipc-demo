<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK3568 IPC Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Segoe UI", sans-serif;
            background: #0f1419;
            color: #e6edf3;
            min-height: 100vh;
            padding: 24px;
        }
        .container { max-width: 720px; margin: 0 auto; }
        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .subtitle { color: #8b949e; margin-bottom: 24px; font-size: 0.9rem; }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card h2 { font-size: 1rem; margin-bottom: 16px; color: #58a6ff; }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .item label { display: block; font-size: 0.75rem; color: #8b949e; margin-bottom: 4px; }
        .item span { font-size: 1.25rem; font-weight: 600; }
        .item span.ok { color: #3fb950; }
        .item span.warn { color: #d29922; }
        .item span.err { color: #f85149; }
        .btns { display: flex; gap: 12px; flex-wrap: wrap; }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
        }
        button.primary { background: #238636; color: #fff; }
        button.primary:hover { background: #2ea043; }
        button.danger { background: #da3633; color: #fff; }
        button.danger:hover { background: #f85149; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .hint {
            font-size: 0.85rem;
            color: #8b949e;
            line-height: 1.6;
        }
        .hint code {
            background: #21262d;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        #msg { margin-top: 12px; font-size: 0.85rem; color: #58a6ff; min-height: 1.2em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>RK3568 IPC Demo</h1>
        <p class="subtitle">设备管理页 · 实时预览请用 VLC + RTSP</p>

        <div class="card">
            <h2>运行状态</h2>
            <div class="grid">
                <div class="item">
                    <label>帧率 (fps)</label>
                    <span id="fps">--</span>
                </div>
                <div class="item">
                    <label>运行时长</label>
                    <span id="uptime">--</span>
                </div>
                <div class="item">
                    <label>录像状态</label>
                    <span id="recording">--</span>
                </div>
                <div class="item">
                    <label>RTSP 推流</label>
                    <span id="streaming">--</span>
                </div>
                <div class="item">
                    <label>采集状态</label>
                    <span id="stream">--</span>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>录像控制</h2>
            <div class="btns">
                <button class="primary" id="btnRecStart">开始录像</button>
                <button class="danger" id="btnRecStop">停止录像</button>
            </div>
        </div>

        <div class="card">
            <h2>RTSP 推流</h2>
            <div class="btns">
                <button class="primary" id="btnStreamStart">开始推流</button>
                <button class="danger" id="btnStreamStop">停止推流</button>
            </div>
            <p id="msg"></p>
        </div>

        <div class="card">
            <h2>实时预览</h2>
            <p class="hint">
                商用 IPC 预览走 RTSP，本页仅做设备管理。PC 端 VLC 打开：<br>
                <code id="rtspUrl">rtsp://&lt;板子IP&gt;:8554/live</code>
            </p>
        </div>
    </div>
    <script src="/app.js"></script>
</body>
</html>
